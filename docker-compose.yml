version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lingban-postgres
    environment:
      POSTGRES_USER: lingban
      POSTGRES_PASSWORD: lingban
      POSTGRES_DB: lingban
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingban"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lingban-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
