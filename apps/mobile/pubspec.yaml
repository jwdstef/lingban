name: lingban
description: "灵伴 AI Companion - AI情感陪伴平台"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Router
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # Local Storage
  shared_preferences: ^2.3.4
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Push Notification
  firebase_messaging: ^15.2.4
  firebase_core: ^3.10.1

  # Audio
  just_audio: ^0.9.43
  record: ^5.2.0
  audioplayers: ^6.1.1

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  equatable: ^2.0.7
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  # fonts:
  #   - family: CustomIcons
  #     fonts:
  #       - asset: assets/fonts/CustomIcons.ttf
