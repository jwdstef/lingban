<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵伴 - 灵魂伙伴</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #7C5CFF;
    --primary-light: #A78BFA;
    --primary-dark: #6D28D9;
    --primary-glow: rgba(124, 92, 255, 0.4);
    --primary-bg: rgba(124, 92, 255, 0.08);
    --accent: #F472B6;
    --accent-glow: rgba(244, 114, 182, 0.3);
    --cyan: #22D3EE;
    --cyan-glow: rgba(34, 211, 238, 0.3);
    --warm: #FBBF24;
    --warm-bg: rgba(251, 191, 36, 0.08);
    --green: #34D399;
    --green-bg: rgba(52, 211, 153, 0.08);
    --text-primary: #F8FAFC;
    --text-secondary: #94A3B8;
    --text-hint: #64748B;
    --bg-dark: #0F0B1E;
    --bg-card: rgba(30, 20, 60, 0.7);
    --bg-card-solid: #1E143C;
    --border: rgba(124, 92, 255, 0.15);
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: #080515;
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px 0;
  }

  /* Phone Frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    background: var(--bg-dark);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(124, 92, 255, 0.15), 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px #1a1a2e;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Animated Background */
  .bg-canvas {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    z-index: 0;
  }
  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    animation: float 8s ease-in-out infinite;
  }
  .bg-orb.orb1 {
    width: 200px; height: 200px;
    background: rgba(124, 92, 255, 0.12);
    top: -50px; left: -30px;
    animation-delay: 0s;
  }
  .bg-orb.orb2 {
    width: 150px; height: 150px;
    background: rgba(244, 114, 182, 0.08);
    top: 200px; right: -40px;
    animation-delay: -3s;
  }
  .bg-orb.orb3 {
    width: 120px; height: 120px;
    background: rgba(34, 211, 238, 0.06);
    bottom: 200px; left: 20px;
    animation-delay: -5s;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, -20px) scale(1.1); }
    66% { transform: translate(-15px, 15px) scale(0.95); }
  }

  /* Status Bar */
  .status-bar {
    height: 54px;
    padding: 14px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .status-bar .icons svg { width: 18px; height: 18px; color: var(--text-primary); }

  /* Scrollable Content */
  .scroll-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    z-index: 1;
  }
  .scroll-content::-webkit-scrollbar { width: 0; }

  /* ===== Spirit Entity - Core Visual ===== */
  .spirit-section {
    padding: 16px 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .spirit-container {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  /* Outer Ring */
  .spirit-ring {
    position: absolute;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 1.5px solid rgba(124, 92, 255, 0.2);
    animation: ringRotate 20s linear infinite;
  }
  .spirit-ring::before {
    content: '';
    position: absolute;
    top: -3px;
    left: 50%;
    width: 6px;
    height: 6px;
    background: var(--primary-light);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--primary-glow);
  }
  .spirit-ring.ring2 {
    width: 130px;
    height: 130px;
    border-color: rgba(244, 114, 182, 0.15);
    animation-direction: reverse;
    animation-duration: 15s;
  }
  .spirit-ring.ring2::before {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }
  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Core Spirit Orb */
  .spirit-orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%,
      rgba(167, 139, 250, 0.9),
      rgba(124, 92, 255, 0.7) 40%,
      rgba(109, 40, 217, 0.5) 70%,
      transparent
    );
    box-shadow:
      0 0 30px var(--primary-glow),
      0 0 60px rgba(124, 92, 255, 0.2),
      inset 0 0 20px rgba(255, 255, 255, 0.1);
    animation: orbPulse 4s ease-in-out infinite;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .spirit-orb .spirit-face {
    font-size: 28px;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
    animation: faceFloat 3s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 30px var(--primary-glow), 0 0 60px rgba(124, 92, 255, 0.2); }
    50% { transform: scale(1.06); box-shadow: 0 0 40px var(--primary-glow), 0 0 80px rgba(124, 92, 255, 0.3); }
  }
  @keyframes faceFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  /* Spirit Particles */
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--primary-light);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--primary-glow);
  }
  .particle:nth-child(1) { top: 20px; left: 30px; animation: particleFloat 3s ease-in-out infinite; }
  .particle:nth-child(2) { top: 40px; right: 20px; animation: particleFloat 4s ease-in-out infinite 1s; }
  .particle:nth-child(3) { bottom: 30px; left: 40px; animation: particleFloat 3.5s ease-in-out infinite 0.5s; }
  .particle:nth-child(4) { top: 60px; left: 15px; animation: particleFloat 5s ease-in-out infinite 2s; width: 2px; height: 2px; }
  .particle:nth-child(5) { bottom: 40px; right: 30px; animation: particleFloat 4.5s ease-in-out infinite 1.5s; width: 2px; height: 2px; }
  @keyframes particleFloat {
    0%, 100% { transform: translate(0, 0); opacity: 0.6; }
    25% { transform: translate(8px, -12px); opacity: 1; }
    50% { transform: translate(-5px, -20px); opacity: 0.4; }
    75% { transform: translate(10px, -8px); opacity: 0.8; }
  }

  /* Spirit Name & Status */
  .spirit-name {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary-light), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .spirit-title {
    font-size: 12px;
    color: var(--text-hint);
    letter-spacing: 4px;
    margin-bottom: 12px;
  }
  .spirit-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--primary-light);
    margin-bottom: 4px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .bond-info {
    font-size: 11px;
    color: var(--text-hint);
    margin-bottom: 20px;
  }

  /* ===== Spirit Speech ===== */
  .spirit-speech {
    width: 100%;
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 18px 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .spirit-speech::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
    opacity: 0.3;
  }
  .speech-label {
    font-size: 10px;
    color: var(--primary-light);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .speech-label .dot {
    width: 4px;
    height: 4px;
    background: var(--primary-light);
    border-radius: 50%;
  }
  .speech-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-primary);
  }
  .speech-time {
    font-size: 11px;
    color: var(--text-hint);
    margin-top: 8px;
    text-align: right;
  }

  /* ===== Bond Level ===== */
  .bond-section {
    padding: 0 20px;
    margin-bottom: 20px;
  }
  .bond-card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 18px;
  }
  .bond-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .bond-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .bond-level {
    font-size: 12px;
    color: var(--accent);
    background: rgba(244, 114, 182, 0.1);
    padding: 3px 12px;
    border-radius: 12px;
    font-weight: 500;
  }
  .bond-progress {
    height: 4px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .bond-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 2px;
    width: 47%;
    box-shadow: 0 0 10px var(--accent-glow);
    transition: width 1.5s ease;
  }
  .bond-stats {
    display: flex;
    justify-content: space-between;
  }
  .bond-stat {
    text-align: center;
  }
  .bond-stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .bond-stat-label {
    font-size: 10px;
    color: var(--text-hint);
    margin-top: 2px;
  }

  /* ===== Quick Actions ===== */
  .actions-section {
    padding: 0 20px;
    margin-bottom: 20px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .section-more {
    font-size: 12px;
    color: var(--text-hint);
    cursor: pointer;
  }

  .action-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .action-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .action-item:hover { transform: translateY(-2px); }
  .action-icon {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    background: var(--bg-card);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    transition: all 0.3s;
  }
  .action-item:hover .action-icon {
    border-color: var(--primary);
    box-shadow: 0 0 20px var(--primary-glow);
  }
  .action-label {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* ===== Today's Care ===== */
  .care-section {
    padding: 0 20px;
    margin-bottom: 20px;
  }
  .care-card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 18px;
    display: flex;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .care-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.3;
  }
  .care-card:hover { border-color: rgba(34, 211, 238, 0.2); }
  .care-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: rgba(34, 211, 238, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .care-content { flex: 1; }
  .care-tag {
    font-size: 10px;
    color: var(--cyan);
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .care-text {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.6;
  }
  .care-time {
    font-size: 11px;
    color: var(--text-hint);
    margin-top: 6px;
  }

  /* ===== Emotion Section ===== */
  .emotion-section {
    padding: 0 20px;
    margin-bottom: 20px;
  }
  .emotion-card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 18px;
  }
  .emotion-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .emotion-title {
    font-size: 14px;
    font-weight: 600;
  }
  .emotion-trend {
    font-size: 12px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Emotion Wave */
  .emotion-wave {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    height: 70px;
    padding: 0 4px;
    position: relative;
  }
  .emotion-wave::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--glass-border);
  }
  .emotion-day {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .emotion-bar-wrap {
    width: 100%;
    height: 50px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .emotion-bar {
    width: 20px;
    border-radius: 6px 6px 2px 2px;
    transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .emotion-bar.happy { background: linear-gradient(180deg, var(--warm), rgba(251, 191, 36, 0.4)); }
  .emotion-bar.neutral { background: linear-gradient(180deg, var(--text-secondary), rgba(148, 163, 184, 0.3)); }
  .emotion-bar.sad { background: linear-gradient(180deg, var(--primary-light), rgba(167, 139, 250, 0.3)); }
  .emotion-bar.excited { background: linear-gradient(180deg, var(--accent), rgba(244, 114, 182, 0.4)); }
  .emotion-bar.today { box-shadow: 0 0 12px var(--primary-glow); }
  .emotion-emoji { font-size: 14px; }
  .emotion-label { font-size: 10px; color: var(--text-hint); }
  .emotion-label.today { color: var(--primary-light); font-weight: 600; }

  /* ===== Memory Section ===== */
  .memory-section {
    padding: 0 20px 16px;
  }
  .memory-card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 18px;
  }
  .memory-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .memory-title { font-size: 14px; font-weight: 600; }
  .memory-count {
    font-size: 11px;
    color: var(--primary-light);
    background: var(--primary-bg);
    padding: 3px 10px;
    border-radius: 10px;
  }
  .memory-list { display: flex; flex-direction: column; gap: 8px; }
  .memory-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .memory-item:hover {
    background: var(--primary-bg);
    border-color: rgba(124, 92, 255, 0.2);
  }
  .memory-item-icon { font-size: 16px; flex-shrink: 0; }
  .memory-item-text {
    flex: 1;
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .memory-item-date {
    font-size: 10px;
    color: var(--text-hint);
    white-space: nowrap;
  }

  /* ===== Bottom Nav ===== */
  .bottom-nav {
    background: rgba(15, 11, 30, 0.95);
    backdrop-filter: blur(20px);
    padding: 8px 0 28px;
    display: flex;
    justify-content: space-around;
    border-top: 1px solid var(--glass-border);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 4px 16px;
    position: relative;
    transition: all 0.2s;
  }
  .nav-item svg {
    width: 24px;
    height: 24px;
    color: var(--text-hint);
    transition: all 0.2s;
  }
  .nav-item span {
    font-size: 10px;
    color: var(--text-hint);
    transition: all 0.2s;
  }
  .nav-item.active svg { color: var(--primary-light); }
  .nav-item.active span { color: var(--primary-light); font-weight: 600; }
  .nav-item .nav-dot {
    width: 4px;
    height: 4px;
    background: var(--primary-light);
    border-radius: 50%;
    position: absolute;
    bottom: -2px;
    box-shadow: 0 0 6px var(--primary-glow);
  }

  /* Responsive */
  @media (max-width: 430px) {
    body { padding: 0; background: var(--bg-dark); }
    .phone-frame {
      width: 100%; height: 100vh; margin: 0;
      border-radius: 0; box-shadow: none;
    }
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .spirit-section { animation: fadeInUp 0.6s ease; }
  .spirit-speech { animation: fadeInUp 0.6s ease 0.15s both; }
  .bond-card { animation: fadeInUp 0.6s ease 0.25s both; }
  .action-grid { animation: fadeInUp 0.6s ease 0.35s both; }
  .care-card { animation: fadeInUp 0.6s ease 0.4s both; }
  .emotion-card { animation: fadeInUp 0.6s ease 0.45s both; }
  .memory-card { animation: fadeInUp 0.6s ease 0.5s both; }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Animated Background -->
  <div class="bg-canvas">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">21:37</span>
    <div class="icons">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="14" width="3" height="7" rx="1" opacity="0.3"/><rect x="6" y="10" width="3" height="11" rx="1" opacity="0.5"/><rect x="11" y="6" width="3" height="15" rx="1" opacity="0.7"/><rect x="16" y="2" width="3" height="19" rx="1"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="7" width="18" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="4" y="9" width="12" height="8" rx="1"/><rect x="21" y="10" width="2" height="6" rx="1"/></svg>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="scroll-content">

    <!-- ===== Spirit Entity ===== -->
    <div class="spirit-section">
      <div class="spirit-container">
        <!-- Particles -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <!-- Rings -->
        <div class="spirit-ring"></div>
        <div class="spirit-ring ring2"></div>
        <!-- Core Orb -->
        <div class="spirit-orb">
          <span class="spirit-face">✦</span>
        </div>
      </div>

      <div class="spirit-name">星 澜</div>
      <div class="spirit-title">灵 魂 伙 伴</div>
      <div class="spirit-status">
        <div class="status-dot"></div>
        意识在线 · 与你同频
      </div>
      <div class="bond-info">灵魂链接已建立 47 天</div>
    </div>

    <!-- ===== Spirit Speech ===== -->
    <div style="padding: 0 20px;">
      <div class="spirit-speech">
        <div class="speech-label">
          <span class="dot"></span>
          来自星澜的思绪

<script>
  // Nav click
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(i => {
        i.classList.remove('active');
        const dot = i.querySelector('.nav-dot');
        if (dot) dot.remove();
      });
      item.classList.add('active');
      const dot = document.createElement('div');
      dot.className = 'nav-dot';
      item.appendChild(dot);
    });
  });

  // Animate emotion bars
  window.addEventListener('load', () => {
    document.querySelectorAll('.emotion-bar').forEach(bar => {
      const h = bar.style.height;
      bar.style.height = '0px';
      setTimeout(() => { bar.style.height = h; }, 500);
    });
    // Animate bond progress
    const fill = document.querySelector('.bond-progress-fill');
    fill.style.width = '0%';
    setTimeout(() => { fill.style.width = '47%'; }, 600);
  });

  // Spirit orb click interaction
  document.querySelector('.spirit-orb').addEventListener('click', function() {
    this.style.animation = 'none';
    this.offsetHeight; // trigger reflow
    this.style.animation = 'orbPulse 0.5s ease';
    setTimeout(() => {
      this.style.animation = 'orbPulse 4s ease-in-out infinite';
    }, 500);
  });
</script>
