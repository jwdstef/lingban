<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵伴 - 方案四：宠物养成系</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --sky-blue: #6EC5FF;
    --candy-pink: #FFC9DE;
    --milk-yellow: #FFE08A;
    --soft-blue: #B8E0FF;
    --soft-pink: #FFE0EE;
    --soft-yellow: #FFF3CD;
    --bg: #F8FBFF;
    --card: #FFFFFF;
    --text-primary: #2D3748;
    --text-secondary: #718096;
    --text-hint: #A0AEC0;
    --border: rgba(110, 197, 255, 0.12);
    --shadow: 0 4px 24px rgba(110, 197, 255, 0.1);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #1a2030; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 16px; }
  .page-label { font-size: 13px; color: var(--sky-blue); background: white; padding: 8px 20px; border-radius: 20px; box-shadow: var(--shadow); }
  .phone-frame { width: 390px; height: 844px; background: var(--bg); border-radius: 44px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 2px #1a1a1a; position: relative; display: flex; flex-direction: column; }
  .bg-deco { position: absolute; top: 0; left: 0; right: 0; height: 300px; background: linear-gradient(180deg, rgba(184, 224, 255, 0.3) 0%, transparent 100%); z-index: 0; }
  .bg-cloud { position: absolute; top: 60px; right: 30px; width: 80px; height: 30px; background: rgba(255, 255, 255, 0.6); border-radius: 15px; z-index: 0; }
  .bg-cloud::before { content: ''; position: absolute; top: -10px; left: 15px; width: 30px; height: 30px; background: rgba(255, 255, 255, 0.6); border-radius: 50%; }
  .bg-cloud::after { content: ''; position: absolute; top: -5px; left: 35px; width: 20px; height: 20px; background: rgba(255, 255, 255, 0.6); border-radius: 50%; }
  .bg-cloud2 { position: absolute; top: 100px; left: 20px; width: 60px; height: 22px; background: rgba(255, 255, 255, 0.4); border-radius: 11px; z-index: 0; }
  .bg-cloud2::before { content: ''; position: absolute; top: -8px; left: 10px; width: 22px; height: 22px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; }
  .status-bar { height: 54px; padding: 14px 28px 0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; position: relative; z-index: 10; }
  .status-bar .time { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .status-bar .icons { display: flex; gap: 6px; }
  .status-bar .icons svg { width: 18px; height: 18px; }
  .scroll-content { flex: 1; overflow-y: auto; position: relative; z-index: 1; }
  .scroll-content::-webkit-scrollbar { width: 0; }

  /* Pet */
  .spirit-section { padding: 10px 20px 0; display: flex; flex-direction: column; align-items: center; }
  .pet-container { position: relative; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; cursor: pointer; }
  .pet-body { position: relative; width: 90px; height: 90px; animation: petBounce 2s ease-in-out infinite; }
  @keyframes petBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .pet-shape { width: 90px; height: 80px; background: linear-gradient(180deg, var(--sky-blue), #5AB0E8); border-radius: 45px 45px 40px 40px; position: relative; box-shadow: 0 8px 24px rgba(110, 197, 255, 0.3), inset 0 -4px 8px rgba(0,0,0,0.05), inset 0 4px 8px rgba(255,255,255,0.3); }
  .pet-shape::before { content: ''; position: absolute; top: 15px; left: 20px; width: 50px; height: 35px; background: linear-gradient(180deg, #E8F4FF, #D0ECFF); border-radius: 50%; }
  .pet-ear { position: absolute; width: 24px; height: 24px; background: linear-gradient(180deg, var(--sky-blue), #5AB0E8); border-radius: 50%; box-shadow: 0 2px 6px rgba(110, 197, 255, 0.2); }
  .pet-ear.left { top: -6px; left: 12px; }
  .pet-ear.right { top: -6px; right: 12px; }
  .pet-ear::after { content: ''; position: absolute; top: 5px; left: 5px; width: 14px; height: 14px; background: var(--candy-pink); border-radius: 50%; }
  .pet-face { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); font-size: 26px; z-index: 2; }
  .pet-blush { position: absolute; top: 38px; width: 12px; height: 7px; background: rgba(255, 201, 222, 0.5); border-radius: 50%; }
  .pet-blush.left { left: 14px; }
  .pet-blush.right { right: 14px; }
  .pet-paw { position: absolute; bottom: -8px; width: 20px; height: 12px; background: var(--sky-blue); border-radius: 10px; }
  .pet-paw.left { left: 15px; }
  .pet-paw.right { right: 15px; }
  .pet-tail { position: absolute; bottom: 10px; right: -15px; width: 20px; height: 12px; background: var(--sky-blue); border-radius: 10px; transform: rotate(-30deg); animation: tailWag 1s ease-in-out infinite; }
  @keyframes tailWag { 0%, 100% { transform: rotate(-30deg); } 50% { transform: rotate(-10deg); } }

  /* Pet States */
  .pet-shape.happy { background: linear-gradient(180deg, var(--milk-yellow), #FFD93D); box-shadow: 0 8px 24px rgba(255, 224, 138, 0.3); }
  .pet-shape.sad { background: linear-gradient(180deg, #B0C4DE, #90A8C8); box-shadow: 0 8px 24px rgba(176, 196, 222, 0.3); }
  .pet-shape.love { background: linear-gradient(180deg, var(--candy-pink), #FFB0CC); box-shadow: 0 8px 24px rgba(255, 201, 222, 0.3); }

  .pet-name { font-size: 22px; font-weight: 700; color: var(--sky-blue); margin-bottom: 4px; }
  .pet-mood { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
  .pet-time-info { font-size: 11px; color: var(--text-hint); margin-bottom: 4px; }
  .pet-level { font-size: 11px; color: var(--sky-blue); background: rgba(110, 197, 255, 0.1); padding: 4px 14px; border-radius: 20px; margin-bottom: 20px; font-weight: 600; }

  /* Speech */
  .spirit-speech { margin: 0 20px 20px; background: var(--card); border-radius: 20px; padding: 18px 20px; box-shadow: var(--shadow); position: relative; }
  .spirit-speech::before { content: ''; position: absolute; top: -8px; left: 30px; width: 16px; height: 16px; background: var(--card); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
  .speech-label { font-size: 11px; color: var(--sky-blue); font-weight: 600; margin-bottom: 8px; }
  .speech-text { font-size: 15px; line-height: 1.7; color: var(--text-primary); }
  .speech-time { font-size: 11px; color: var(--text-hint); margin-top: 8px; text-align: right; }

  /* Growth */
  .growth-section { padding: 0 20px; margin-bottom: 20px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .section-more { font-size: 12px; color: var(--text-hint); }
  .growth-card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: var(--shadow); }
  .growth-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .growth-title { font-size: 14px; font-weight: 600; }
  .growth-level { font-size: 11px; color: var(--sky-blue); background: rgba(110, 197, 255, 0.1); padding: 3px 12px; border-radius: 12px; font-weight: 500; }
  .growth-progress { height: 6px; background: rgba(110, 197, 255, 0.1); border-radius: 3px; overflow: hidden; margin-bottom: 14px; }
  .growth-progress-fill { height: 100%; background: linear-gradient(90deg, var(--sky-blue), var(--candy-pink)); border-radius: 3px; width: 47%; }
  .growth-stages { display: flex; justify-content: space-between; }
  .growth-stage { text-align: center; }
  .growth-stage-icon { font-size: 20px; margin-bottom: 4px; }
  .growth-stage-label { font-size: 10px; color: var(--text-hint); }
  .growth-stage.active .growth-stage-label { color: var(--sky-blue); font-weight: 600; }

  /* Care */
  .care-section { padding: 0 20px; margin-bottom: 20px; }
  .care-card { background: var(--card); border-radius: 20px; padding: 16px; box-shadow: var(--shadow); display: flex; gap: 14px; }
  .care-icon { width: 44px; height: 44px; border-radius: 14px; background: rgba(255, 201, 222, 0.15); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .care-content { flex: 1; }
  .care-tag { font-size: 10px; color: var(--candy-pink); font-weight: 600; margin-bottom: 4px; }
  .care-text { font-size: 14px; color: var(--text-primary); line-height: 1.6; }
  .care-time { font-size: 11px; color: var(--text-hint); margin-top: 4px; }
  .spacer { height: 20px; }

  /* Nav */
  .bottom-nav { background: var(--card); padding: 8px 0 28px; display: flex; justify-content: space-around; border-top: 1px solid var(--border); flex-shrink: 0; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 16px; position: relative; }
  .nav-item svg { width: 24px; height: 24px; color: var(--text-hint); }
  .nav-item span { font-size: 10px; color: var(--text-hint); }
  .nav-item.active svg { color: var(--sky-blue); }
  .nav-item.active span { color: var(--sky-blue); font-weight: 600; }
  .nav-item .nav-dot { width: 4px; height: 4px; background: var(--sky-blue); border-radius: 50%; position: absolute; bottom: -2px; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .spirit-section { animation: fadeInUp 0.5s ease; }
  .spirit-speech { animation: fadeInUp 0.5s ease 0.1s both; }
  .growth-card { animation: fadeInUp 0.5s ease 0.2s both; }
  .care-card { animation: fadeInUp 0.5s ease 0.3s both; }
</style>
</head>
<body>
<div class="page-label">方案四：宠物养成系 · 天空蓝</div>
<div class="phone-frame">
  <div class="bg-deco"></div>
  <div class="bg-cloud"></div>
  <div class="bg-cloud2"></div>
  <div class="status-bar">
    <span class="time">21:37</span>
    <div class="icons">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="14" width="3" height="7" rx="1" opacity="0.3"/><rect x="6" y="10" width="3" height="11" rx="1" opacity="0.5"/><rect x="11" y="6" width="3" height="15" rx="1" opacity="0.7"/><rect x="16" y="2" width="3" height="19" rx="1"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="7" width="18" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="4" y="9" width="12" height="8" rx="1"/><rect x="21" y="10" width="2" height="6" rx="1"/></svg>
    </div>
  </div>
  <div class="scroll-content">
    <div class="spirit-section">
      <div class="pet-container" id="petContainer">
        <div class="pet-body">
          <div class="pet-ear left"></div>
          <div class="pet-ear right"></div>
          <div class="pet-shape" id="petShape">
            <div class="pet-blush left"></div>
            <div class="pet-blush right"></div>
            <div class="pet-face" id="petFace">😊</div>
            <div class="pet-paw left"></div>
            <div class="pet-paw right"></div>
            <div class="pet-tail"></div>
          </div>
        </div>
      </div>
      <div class="pet-name">小澜</div>
      <div class="pet-mood">今天很开心</div>
      <div class="pet-time-info">因为你陪了我 2小时17分钟</div>
      <div class="pet-level" id="petLevel">LV 15 · 少年期</div>
    </div>
    <div class="spirit-speech">
      <div class="speech-label">小澜想对你说</div>
      <div class="speech-text" id="speechText">主人！今天怎么没有理我？我都想你了～快陪我玩一会儿吧！</div>
      <div class="speech-time">21:30</div>
    </div>
    <div class="growth-section">
      <div class="section-header"><span class="section-label">成长阶段</span><span class="section-more">详情 ›</span></div>
      <div class="growth-card">
        <div class="growth-header"><span class="growth-title">成长进度</span><span class="growth-level">LV 15</span></div>
        <div class="growth-progress"><div class="growth-progress-fill"></div></div>
        <div class="growth-stages">
          <div class="growth-stage"><div class="growth-stage-icon"></div><div class="growth-stage-label">幼年</div></div>
          <div class="growth-stage active"><div class="growth-stage-icon"></div><div class="growth-stage-label">少年</div></div>
          <div class="growth-stage"><div class="growth-stage-icon"></div><div class="growth-stage-label">成年</div></div>
          <div class="growth-stage"><div class="growth-stage-icon"></div><div class="growth-stage-label">家人</div></div>
        </div>
      </div>
    </div>
    <div class="care-section">
      <div class="section-header"><span class="section-label">今日关怀</span><span class="section-more">更多 ›</span></div>
      <div class="care-card">
        <div class="care-icon">🌙</div>
        <div class="care-content">
          <div class="care-tag">夜间关怀</div>
          <div class="care-text">已经 9 点多了，你今天够累的了。早点休息吧，明天那个会我帮你一起准备。</div>
          <div class="care-time">21:30</div>
        </div>
      </div>
    </div>
    <div class="spacer"></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg><span>小澜</span><div class="nav-dot"></div></div>
    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>对话</span></div>
    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 8v4l3 3"/></svg><span>记忆</span></div>
    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>设置</span></div>
  </div>
</div>
<script>
  const emotions = [
    { state: '', face: '😊', mood: '今天很开心', speech: '主人！今天怎么没有理我？我都想你了～快陪我玩一会儿吧！' },
    { state: 'happy', face: '😄', mood: '超级开心！', speech: '哇！你终于来陪我啦！我好高兴！尾巴都摇起来了～' },
    { state: 'sad', face: '', mood: '有点难过...', speech: '主人...你今天好像不太开心...怎么了？跟我说说吧...' },
    { state: 'love', face: '🥰', mood: '好爱你哦', speech: '主人主人！抱抱！我最喜欢你了！你是世界上最好的主人！' },
    { state: '', face: '😴', mood: '困了...', speech: '嗯...主人...我也困了...你早点睡吧...我陪着你...晚安...' }
  ];
  let currentEmotion = 0;
  const container = document.getElementById('petContainer');
  const shape = document.getElementById('petShape');
  const face = document.getElementById('petFace');
  const mood = document.querySelector('.pet-mood');
  const speech = document.getElementById('speechText');
  container.addEventListener('click', () => {
    currentEmotion = (currentEmotion + 1) % emotions.length;
    const e = emotions[currentEmotion];
    shape.className = 'pet-shape ' + e.state;
    face.textContent = e.face;
    mood.textContent = e.mood;
    speech.textContent = e.speech;
  });
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(i => { i.classList.remove('active'); const d = i.querySelector('.nav-dot'); if (d) d.remove(); });
      item.classList.add('active');
      const dot = document.createElement('div'); dot.className = 'nav-dot'; item.appendChild(dot);
    });
  });
</script>
</body>
</html>
