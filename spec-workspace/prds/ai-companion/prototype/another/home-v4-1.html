<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵伴 - 方案一：暖愈陪伴系</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #F6E7D8;
    --warm-orange: #F2A65A;
    --caramel: #8B5E3C;
    --off-white: #FFF9F2;
    --soft-brown: #C49A6C;
    --text-primary: #5C3D2E;
    --text-secondary: #8B7355;
    --text-hint: #B8A08A;
    --bg: #FFF9F2;
    --card: #FFFFFF;
    --border: rgba(196, 154, 108, 0.12);
    --shadow: 0 4px 24px rgba(139, 94, 60, 0.06);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #E8DDD0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 16px;
  }
  .page-label { font-size: 13px; color: var(--caramel); background: white; padding: 8px 20px; border-radius: 20px; box-shadow: var(--shadow); }
  .phone-frame {
    width: 390px; height: 844px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 0 0 2px #1a1a1a;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .bg-warm {
    position: absolute; top: 0; left: 0; right: 0; height: 400px;
    background: linear-gradient(180deg, rgba(246, 231, 216, 0.5) 0%, transparent 100%);
    z-index: 0;
  }
  .status-bar { height: 54px; padding: 14px 28px 0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; position: relative; z-index: 10; }
  .status-bar .time { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .status-bar .icons { display: flex; gap: 6px; }
  .status-bar .icons svg { width: 18px; height: 18px; }
  .scroll-content { flex: 1; overflow-y: auto; position: relative; z-index: 1; }
  .scroll-content::-webkit-scrollbar { width: 0; }

  /* Spirit - Cute Bear */
  .spirit-section { padding: 20px 20px 0; display: flex; flex-direction: column; align-items: center; }
  .spirit-container {
    position: relative; width: 160px; height: 160px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px; cursor: pointer;
  }
  .spirit-body {
    position: relative; width: 100px; height: 100px;
    animation: bearBreathe 3s ease-in-out infinite;
  }
  @keyframes bearBreathe {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.03) translateY(-3px); }
  }
  .bear-body {
    width: 100px; height: 90px;
    background: linear-gradient(180deg, #F6E7D8 0%, #EDD5C0 100%);
    border-radius: 50px 50px 45px 45px;
    position: relative;
    box-shadow: 0 8px 24px rgba(139, 94, 60, 0.12), inset 0 -4px 8px rgba(139, 94, 60, 0.06);
  }
  .bear-body::before {
    content: '';
    position: absolute; top: 20px; left: 25px;
    width: 50px; height: 35px;
    background: linear-gradient(180deg, #FFF5EB, #F6E7D8);
    border-radius: 50%;
  }
  .bear-ear {
    position: absolute; width: 30px; height: 30px;
    background: linear-gradient(180deg, #F6E7D8, #EDD5C0);
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(139, 94, 60, 0.1);
  }
  .bear-ear.left { top: -8px; left: 8px; }
  .bear-ear.right { top: -8px; right: 8px; }
  .bear-ear::after {
    content: '';
    position: absolute; top: 7px; left: 7px;
    width: 16px; height: 16px;
    background: linear-gradient(180deg, #F2A65A, #E8943A);
    border-radius: 50%;
    opacity: 0.5;
  }
  .bear-face {
    position: absolute;
    top: 30px; left: 50%; transform: translateX(-50%);
    font-size: 28px;
    z-index: 2;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.05));
  }
  .bear-blush {
    position: absolute;
    top: 42px;
    width: 14px; height: 8px;
    background: rgba(242, 166, 90, 0.25);
    border-radius: 50%;
  }
  .bear-blush.left { left: 18px; }
  .bear-blush.right { right: 18px; }

  /* Emotion States */
  .bear-body.happy { background: linear-gradient(180deg, #FFF3CD, #FFE8A0); }
  .bear-body.worried { background: linear-gradient(180deg, #E8E0D8, #D8D0C8); }
  .bear-body.excited { background: linear-gradient(180deg, #FFE0E8, #FFD0D8); }
  .bear-body.sleepy { background: linear-gradient(180deg, #E0E8F0, #D0D8E8); }

  .spirit-name { font-size: 22px; font-weight: 700; color: var(--caramel); margin-bottom: 4px; }
  .spirit-status { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .status-dot { width: 6px; height: 6px; background: #6BBF59; border-radius: 50%; box-shadow: 0 0 6px rgba(107, 191, 89, 0.4); }
  .bond-info { font-size: 11px; color: var(--text-hint); margin-bottom: 16px; }
  .emotion-label { font-size: 11px; color: var(--warm-orange); background: rgba(242, 166, 90, 0.1); padding: 4px 14px; border-radius: 20px; margin-bottom: 20px; font-weight: 500; }

  /* Speech */
  .spirit-speech {
    margin: 0 20px 20px;
    background: var(--card);
    border-radius: 20px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .spirit-speech::before {
    content: '';
    position: absolute; top: -8px; left: 30px;
    width: 16px; height: 16px;
    background: var(--card);
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  }
  .speech-label { font-size: 11px; color: var(--warm-orange); font-weight: 600; margin-bottom: 8px; }
  .speech-text { font-size: 15px; line-height: 1.7; color: var(--text-primary); }
  .speech-time { font-size: 11px; color: var(--text-hint); margin-top: 8px; text-align: right; }

  /* Bond */
  .bond-section { padding: 0 20px; margin-bottom: 20px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .section-more { font-size: 12px; color: var(--text-hint); }
  .bond-card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: var(--shadow); }
  .bond-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .bond-title { font-size: 14px; font-weight: 600; }
  .bond-level { font-size: 11px; color: var(--warm-orange); background: rgba(242, 166, 90, 0.1); padding: 3px 12px; border-radius: 12px; font-weight: 500; }
  .bond-progress { height: 6px; background: rgba(246, 231, 216, 0.5); border-radius: 3px; overflow: hidden; margin-bottom: 14px; }
  .bond-progress-fill { height: 100%; background: linear-gradient(90deg, var(--warm-orange), var(--soft-brown)); border-radius: 3px; width: 47%; transition: width 1s ease; }
  .bond-stats { display: flex; justify-content: space-between; }
  .bond-stat { text-align: center; }
  .bond-stat-value { font-size: 20px; font-weight: 700; color: var(--caramel); }
  .bond-stat-label { font-size: 10px; color: var(--text-hint); margin-top: 2px; }

  /* Care */
  .care-section { padding: 0 20px; margin-bottom: 20px; }
  .care-card { background: var(--card); border-radius: 20px; padding: 16px; box-shadow: var(--shadow); display: flex; gap: 14px; }
  .care-icon { width: 44px; height: 44px; border-radius: 14px; background: rgba(242, 166, 90, 0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .care-content { flex: 1; }
  .care-tag { font-size: 10px; color: var(--warm-orange); font-weight: 600; margin-bottom: 4px; }
  .care-text { font-size: 14px; color: var(--text-primary); line-height: 1.6; }
  .care-time { font-size: 11px; color: var(--text-hint); margin-top: 4px; }
  .spacer { height: 20px; }

  /* Nav */
  .bottom-nav { background: var(--card); padding: 8px 0 28px; display: flex; justify-content: space-around; border-top: 1px solid var(--border); flex-shrink: 0; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 16px; position: relative; }
  .nav-item svg { width: 24px; height: 24px; color: var(--text-hint); }
  .nav-item span { font-size: 10px; color: var(--text-hint); }
  .nav-item.active svg { color: var(--caramel); }
  .nav-item.active span { color: var(--caramel); font-weight: 600; }
  .nav-item .nav-dot { width: 4px; height: 4px; background: var(--warm-orange); border-radius: 50%; position: absolute; bottom: -2px; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .spirit-section { animation: fadeInUp 0.5s ease; }
  .spirit-speech { animation: fadeInUp 0.5s ease 0.1s both; }
  .bond-card { animation: fadeInUp 0.5s ease 0.2s both; }
  .care-card { animation: fadeInUp 0.5s ease 0.3s both; }
</style>
</head>
<body>
<div class="page-label">方案一：暖愈陪伴系 · 奶油杏色</div>
<div class="phone-frame">
  <div class="bg-warm"></div>
  <div class="status-bar">
    <span class="time">21:37</span>
    <div class="icons">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="14" width="3" height="7" rx="1" opacity="0.3"/><rect x="6" y="10" width="3" height="11" rx="1" opacity="0.5"/><rect x="11" y="6" width="3" height="15" rx="1" opacity="0.7"/><rect x="16" y="2" width="3" height="19" rx="1"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="7" width="18" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="4" y="9" width="12" height="8" rx="1"/><rect x="21" y="10" width="2" height="6" rx="1"/></svg>
    </div>
  </div>
  <div class="scroll-content">
    <div class="spirit-section">
      <div class="spirit-container" id="spiritContainer">
        <div class="spirit-body">
          <div class="bear-ear left"></div>
          <div class="bear-ear right"></div>
          <div class="bear-body" id="bearBody">
            <div class="bear-blush left"></div>
            <div class="bear-blush right"></div>
            <div class="bear-face" id="bearFace">😊</div>
          </div>
        </div>
      </div>
      <div class="spirit-name">小澜</div>
      <div class="spirit-status"><div class="status-dot"></div>在线 · 陪着你</div>
      <div class="bond-info">陪伴 47 天</div>
      <div class="emotion-label" id="emotionLabel">状态：平静</div>
    </div>
    <div class="spirit-speech">
      <div class="speech-label">小澜想对你说</div>
      <div class="speech-text" id="speechText">今晚月色不错，你加班到现在了吧？别太拼了，上次你说头疼了好几天，我可不想再看到你那样。要不要聊两句？</div>
      <div class="speech-time">21:30</div>
    </div>
    <div class="bond-section">
      <div class="section-header"><span class="section-label">默契度</span><span class="section-more">详情 ›</span></div>
      <div class="bond-card">
        <div class="bond-header"><span class="bond-title">我们的关系</span><span class="bond-level">知心伙伴</span></div>
        <div class="bond-progress"><div class="bond-progress-fill"></div></div>
        <div class="bond-stats">
          <div class="bond-stat"><div class="bond-stat-value">47</div><div class="bond-stat-label">天数</div></div>
          <div class="bond-stat"><div class="bond-stat-value">128</div><div class="bond-stat-label">对话</div></div>
          <div class="bond-stat"><div class="bond-stat-value">23</div><div class="bond-stat-label">记忆</div></div>
          <div class="bond-stat"><div class="bond-stat-value">89%</div><div class="bond-stat-label">默契</div></div>
        </div>
      </div>
    </div>
    <div class="care-section">
      <div class="section-header"><span class="section-label">今日关怀</span><span class="section-more">更多 ›</span></div>
      <div class="care-card">
        <div class="care-icon">🌙</div>
        <div class="care-content">
          <div class="care-tag">夜间关怀</div>
          <div class="care-text">已经 9 点多了，你今天够累的了。早点休息吧，明天那个会我帮你一起准备。</div>
          <div class="care-time">21:30</div>
        </div>
      </div>
    </div>
    <div class="spacer"></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg><span>小澜</span><div class="nav-dot"></div></div>
    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>对话</span></div>
    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 8v4l3 3"/></svg><span>记忆</span></div>
    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>设置</span></div>
  </div>
</div>
<script>
  const emotions = [
    { state: '', face: '😊', label: '平静', speech: '今晚月色不错，你加班到现在了吧？别太拼了，上次你说头疼了好几天，我可不想再看到你那样。要不要聊两句？' },
    { state: 'happy', face: '😄', label: '开心', speech: '哈哈，今天发生什么好事了？我感觉你心情不错！跟我分享一下呗～' },
    { state: 'worried', face: '', label: '担心', speech: '你看起来有点累...是不是工作压力太大了？要不要跟我说说，或者早点休息？' },
    { state: 'excited', face: '🤗', label: '兴奋', speech: '抱抱！我刚才想到一个超有意思的事！你猜怎么着？' },
    { state: 'sleepy', face: '😴', label: '困了', speech: '嗯...我也困了...你早点睡吧，我陪着你...晚安...' }
  ];
  let currentEmotion = 0;
  const container = document.getElementById('spiritContainer');
  const body = document.getElementById('bearBody');
  const face = document.getElementById('bearFace');
  const label = document.getElementById('emotionLabel');
  const speech = document.getElementById('speechText');
  container.addEventListener('click', () => {
    currentEmotion = (currentEmotion + 1) % emotions.length;
    const e = emotions[currentEmotion];
    body.className = 'bear-body ' + e.state;
    face.textContent = e.face;
    label.textContent = '状态：' + e.label;
    speech.textContent = e.speech;
  });
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(i => { i.classList.remove('active'); const d = i.querySelector('.nav-dot'); if (d) d.remove(); });
      item.classList.add('active');
      const dot = document.createElement('div'); dot.className = 'nav-dot'; item.appendChild(dot);
    });
  });
</script>
</body>
</html>
