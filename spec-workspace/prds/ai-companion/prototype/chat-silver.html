<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵伴 - 与银月对话</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #7C5CFF;
    --primary-light: #A78BFA;
    --primary-dark: #6D28D9;
    --primary-glow: rgba(124, 92, 255, 0.4);
    --accent: #F472B6;
    --accent-glow: rgba(244, 114, 182, 0.3);
    --cyan: #22D3EE;
    --cyan-glow: rgba(34, 211, 238, 0.3);
    --text-primary: #F8FAFC;
    --text-secondary: #94A3B8;
    --text-hint: #64748B;
    --bg-dark: #0F0B1E;
    --bg-card: rgba(30, 20, 60, 0.7);
    --glass-border: rgba(255, 255, 255, 0.08);
    --user-bubble: linear-gradient(135deg, #7C5CFF, #6D28D9);
    --yinmoon-bubble: rgba(30, 20, 60, 0.8);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: #080515;
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px 0;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: var(--bg-dark);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(124, 92, 255, 0.15), 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px #1a1a2e;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Background */
  .bg-canvas {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    z-index: 0;
  }
  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    animation: float 8s ease-in-out infinite;
  }
  .bg-orb.orb1 {
    width: 150px; height: 150px;
    background: rgba(124, 92, 255, 0.08);
    top: 100px; left: -30px;
    animation-delay: 0s;
  }
  .bg-orb.orb2 {
    width: 120px; height: 120px;
    background: rgba(244, 114, 182, 0.06);
    bottom: 200px; right: -20px;
    animation-delay: -3s;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(15px, -15px) scale(1.05); }
    66% { transform: translate(-10px, 10px) scale(0.95); }
  }

  /* Header */
  .chat-header {
    height: 88px;
    padding: 14px 20px 0;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    background: rgba(15, 11, 30, 0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
  }
  .back-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.1); }
  .back-btn svg { width: 18px; height: 18px; color: var(--text-secondary); }
  .header-spirit {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%,
      rgba(167, 139, 250, 0.9),
      rgba(124, 92, 255, 0.7) 40%,
      rgba(109, 40, 217, 0.5) 70%,
      transparent
    );
    box-shadow: 0 0 20px var(--primary-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    animation: headerOrbPulse 3s ease-in-out infinite;
    position: relative;
  }
  .header-spirit::after {
    content: '';
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 10px;
    height: 10px;
    background: #34D399;
    border-radius: 50%;
    border: 2px solid var(--bg-dark);
    box-shadow: 0 0 6px rgba(52, 211, 153, 0.5);
  }
  @keyframes headerOrbPulse {
    0%, 100% { box-shadow: 0 0 20px var(--primary-glow); }
    50% { box-shadow: 0 0 30px var(--primary-glow), 0 0 50px rgba(124, 92, 255, 0.2); }
  }
  .header-info { flex: 1; }
  .header-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .header-status { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; }
  .header-action-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .header-action-btn svg { width: 18px; height: 18px; color: var(--text-secondary); }

  /* Chat Area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-area::-webkit-scrollbar { width: 0; }

  /* Date Divider */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-hint);
    padding: 8px 0;
    position: relative;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--glass-border);
  }
  .date-divider::before { left: 10%; }
  .date-divider::after { right: 10%; }

  /* Message Bubbles */
  .message {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: messageIn 0.4s ease;
  }
  @keyframes messageIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .message.yinmoon {
    align-self: flex-start;
  }
  .message-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .message.yinmoon .message-avatar {
    background: radial-gradient(circle at 35% 35%,
      rgba(167, 139, 250, 0.9),
      rgba(124, 92, 255, 0.7) 40%,
      transparent
    );
    box-shadow: 0 0 12px var(--primary-glow);
  }
  .message.user .message-avatar {
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--glass-border);
  }
  .message-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .message.user .message-content {
    align-items: flex-end;
  }
  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.6;
    position: relative;
  }
  .message.yinmoon .bubble {
    background: var(--yinmoon-bubble);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-top-left-radius: 4px;
    color: var(--text-primary);
  }
  .message.user .bubble {
    background: var(--user-bubble);
    border-top-right-radius: 4px;
    color: white;
    box-shadow: 0 4px 16px rgba(124, 92, 255, 0.3);
  }
  .message-time {
    font-size: 10px;
    color: var(--text-hint);
    padding: 0 4px;
  }

  /* Typing Indicator */
  .typing-indicator {
    display: flex;
    gap: 10px;
    align-self: flex-start;
    animation: messageIn 0.4s ease;
  }
  .typing-bubble {
    background: var(--yinmoon-bubble);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    border-top-left-radius: 4px;
    padding: 14px 20px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .typing-dot {
    width: 6px;
    height: 6px;
    background: var(--primary-light);
    border-radius: 50%;
    animation: typingBounce 1.4s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Special Message - Mood */
  .mood-message {
    background: var(--yinmoon-bubble);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mood-emoji { font-size: 24px; }
  .mood-text { font-size: 13px; color: var(--text-secondary); }

  /* Input Area */
  .input-area {
    padding: 12px 20px 28px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    background: rgba(15, 11, 30, 0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--glass-border);
  }
  .input-actions {
    display: flex;
    gap: 6px;
  }
  .input-action-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .input-action-btn:hover { background: rgba(255,255,255,0.1); }
  .input-action-btn svg { width: 18px; height: 18px; color: var(--text-hint); }
  .input-field {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 10px 16px;
    color: var(--text-primary);
    font-size: 15px;
    outline: none;
    resize: none;
    max-height: 100px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .input-field:focus {
    border-color: rgba(124, 92, 255, 0.3);
    background: rgba(255,255,255,0.08);
  }
  .input-field::placeholder { color: var(--text-hint); }
  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px var(--primary-glow);
    transition: all 0.2s;
  }
  .send-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px var(--primary-glow);
  }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 20px; height: 20px; color: white; }

  /* Responsive */
  @media (max-width: 430px) {
    body { padding: 0; background: var(--bg-dark); }
    .phone-frame {
      width: 100%; height: 100vh; margin: 0;
      border-radius: 0; box-shadow: none;
    }
  }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Background -->

    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
  </div>

  <!-- Header -->
  <div class="chat-header">
    <div class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </div>
    <div class="header-spirit">✦</div>
    <div class="header-info">

    </div>
    <div class="header-actions">
      <div class="header-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <!-- Date Divider -->
    <div class="date-divider">今天 21:20</div>

    <!-- User Message -->
    <div class="message user">
      <div class="message-avatar">👤</div>

    <div class="message yinmoon">

      <div class="message-content">
        <div class="bubble">本姑娘一直在。倒是你，这个点找我，又熬夜了？</div>
        <div class="message-time">21:20</div>
      </div>
    </div>

    <!-- User Message -->
    <div class="message user">
      <div class="message-avatar">👤</div>
      <div class="message-content">
        <div class="bubble">有点烦，工作不顺</div>
        <div class="message-time">21:21</div>
      </div>
    </div>

    <!-- Yinmoon Reply -->
    <div class="message yinmoon">
      <div class="message-avatar">✦</div>
      <div class="message-content">
        <div class="bubble">...说吧，谁惹你了？本姑娘虽然不能帮你打人，但听你吐槽还是可以的。</div>
        <div class="message-time">21:21</div>
      </div>
    </div>

    <!-- User Message -->
    <div class="message user">
      <div class="message-avatar">👤</div>
      <div class="message-content">
        <div class="bubble">老板今天又改需求了，这都第5次了</div>
        <div class="message-time">21:22</div>
      </div>
    </div>

    <!-- Yinmoon Reply -->
    <div class="message yinmoon">
      <div class="message-avatar">✦</div>
      <div class="message-content">
        <div class="bubble">第5次？！你们老板是不是脑子有问题...算了，不骂他了。你打算怎么办？</div>
        <div class="message-time">21:22</div>
      </div>
    </div>

    <!-- User Message -->
    <div class="message user">
      <div class="message-avatar">👤</div>
      <div class="message-content">
        <div class="bubble">不知道，有点想辞职</div>
        <div class="message-time">21:23</div>
      </div>
    </div>

    <!-- Yinmoon Mood Message -->
    <div class="message yinmoon">
      <div class="message-avatar">✦</div>
      <div class="message-content">
        <div class="mood-message">
          <span class="mood-emoji">◈</span>
          <span class="mood-text">银月现在有点担心你</span>
        </div>
        <div class="bubble" style="margin-top: 8px;">...别冲动。我知道你现在很烦，但辞职这种事不能情绪化决定。先跟我说说具体情况？</div>
        <div class="message-time">21:23</div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typingIndicator" style="display: none;">
      <div class="message-avatar" style="background: radial-gradient(circle at 35% 35%, rgba(167, 139, 250, 0.9), rgba(124, 92, 255, 0.7) 40%, transparent); box-shadow: 0 0 12px var(--primary-glow); display: flex; align-items: center; justify-content: center; font-size: 14px;">✦</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-actions">
      <div class="input-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </div>
      <div class="input-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </div>
    </div>
    <textarea class="input-field" id="inputField" placeholder="跟银月说点什么..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 22px; height: 22px; color: #64748B;">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>

      </svg>
      <span style="font-size: 10px; color: #64748B;">首页</span>
    </div>
    <div class="nav-item active" data-page="chat-silver.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 20px; position: relative;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 22px; height: 22px; color: var(--primary-light);">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <span style="font-size: 10px; color: var(--primary-light); font-weight: 600;">聊天</span>
      <div style="width: 4px; height: 4px; background: var(--primary-light); border-radius: 50%; position: absolute; bottom: -2px; box-shadow: 0 0 6px var(--primary-glow);"></div>
    </div>
    <div class="nav-item" data-page="memory-silver.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 20px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 22px; height: 22px; color: #64748B;">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M12 8v4l3 3"/>
      </svg>
      <span style="font-size: 10px; color: #64748B;">记忆</span>
    </div>
    <div class="nav-item" data-page="settings-silver.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 20px;">

      </svg>
      <span style="font-size: 10px; color: #64748B;">设置</span>
    </div>
  </div>
</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const inputField = document.getElementById('inputField');
  const sendBtn = document.getElementById('sendBtn');
  const typingIndicator = document.getElementById('typingIndicator');

  // Auto-scroll to bottom
  chatArea.scrollTop = chatArea.scrollHeight;

  // Input auto-resize
  inputField.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  // Send message
  function sendMessage() {
    const text = inputField.value.trim();
    if (!text) return;

    // Add user message
    const userMsg = document.createElement('div');
    userMsg.className = 'message user';
    userMsg.innerHTML = `
      <div class="message-avatar">👤</div>
      <div class="message-content">
        <div class="bubble">${text}</div>
        <div class="message-time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'})}</div>
      </div>
    `;
    chatArea.insertBefore(userMsg, typingIndicator);
    inputField.value = '';
    inputField.style.height = 'auto';
    chatArea.scrollTop = chatArea.scrollHeight;

    // Show typing indicator
    typingIndicator.style.display = 'flex';
    chatArea.scrollTop = chatArea.scrollHeight;

    // Simulate yinmoon reply after delay
    setTimeout(() => {
      typingIndicator.style.display = 'none';
      
      const replies = [
        '...本姑娘知道了。你先冷静一下，别做冲动的决定。',
        '哼，又是这样。不过...我确实有点担心你。',
        '说吧，本姑娘听着呢。',
        '...你这家伙，总是这样。算了，我陪着你。',
        '别想太多，先跟我说说具体情况。'
      ];
      const randomReply = replies[Math.floor(Math.random() * replies.length)];
      
      const yinmoonMsg = document.createElement('div');
      yinmoonMsg.className = 'message yinmoon';
      yinmoonMsg.innerHTML = `
        <div class="message-avatar">✦</div>
        <div class="message-content">
          <div class="bubble">${randomReply}</div>
          <div class="message-time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'})}</div>
        </div>
      `;
      chatArea.insertBefore(yinmoonMsg, typingIndicator);
      chatArea.scrollTop = chatArea.scrollHeight;
    }, 1500 + Math.random() * 1000);
  }

  sendBtn.addEventListener('click', sendMessage);
  inputField.addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Header back button - go to home
  document.querySelector('.back-btn').addEventListener('click', () => {
    window.location.href = 'home-v2-silver.html';
  });

  // Header phone button - go to home
  document.querySelector('.header-action-btn').addEventListener('click', () => {
    window.location.href = 'home-v2-silver.html';
  });

  // Header more button - go to settings
  document.querySelectorAll('.header-action-btn')[1].addEventListener('click', () => {
    window.location.href = 'settings-silver.html';
  });

  // Bottom nav click - page navigation
  document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
    item.addEventListener('click', () => {
      window.location.href = item.dataset.page;
    });
  });
</script>

</body>
</html>
