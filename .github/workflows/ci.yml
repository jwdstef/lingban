name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lingban
          POSTGRES_PASSWORD: lingban
          POSTGRES_DB: lingban
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lingban -d lingban"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      DEBUG: "false"
      SECRET_KEY: test-secret
      JWT_SECRET_KEY: test-jwt-secret
      DATABASE_URL: postgresql+asyncpg://lingban:lingban@127.0.0.1:5432/lingban
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: services/backend
        run: python -m pip install -r requirements.txt
      - name: Run migrations
        working-directory: services/backend
        run: alembic upgrade head
      - name: Compile backend
        working-directory: services/backend
        run: python -m compileall app tests
      - name: Backend unit tests
        working-directory: services/backend
        run: python -m unittest discover -s tests
      - name: API smoke
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../../uvicorn.log 2>&1 &
          echo $! > ../../uvicorn.pid
          cd ../..
          python - <<'PY'
          import time
          import httpx

          for _ in range(60):
              try:
                  if httpx.get("http://127.0.0.1:8000/health", timeout=2).status_code == 200:
                      break
              except Exception:
                  pass
              time.sleep(1)
          else:
              raise SystemExit("backend did not become healthy")
          PY
          python scripts/api_smoke.py --base-url http://127.0.0.1:8000
        working-directory: services/backend
      - name: Stop API smoke server
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi
          if [ -f uvicorn.log ]; then
            tail -n 120 uvicorn.log
          fi

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get
      - name: Analyze mobile
        working-directory: apps/mobile
        run: dart analyze lib test
      - name: Test mobile
        working-directory: apps/mobile
        run: flutter test
      - name: Build mobile web
        working-directory: apps/mobile
        run: flutter build web --dart-define=API_BASE_URL=http://127.0.0.1:8000 --no-wasm-dry-run

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install admin dependencies
        working-directory: apps/admin
        run: npm install
      - name: Build admin
        working-directory: apps/admin
        run: npm run build
